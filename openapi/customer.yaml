openapi: 3.0.3
info:
  title: CMS 고객 관리 API
  version: "1.0.0"
  description: |
    기업 고객관리 시스템의 고객 관련 API 명세서입니다.
    - 고객 등록 / 수정 / 조회
    - [관리자] 고객 숨기기/표시

servers:
  - url: /backend/customer
    description: 고객 Backend API 서버

tags:
  - name: 고객
    description: 고객 정보 CRUD
  - name: 관리자-고객
    description: 관리자 전용 고객 관리

paths:
  /list.php:
    get:
      tags: [고객]
      summary: 고객 목록 조회
      description: |
        전체 고객 목록을 반환합니다.
        - 일반 사용자: is_hidden=0인 고객만 조회
        - 관리자: 숨김 고객 포함 전체 조회
      security:
        - sessionAuth: []
      responses:
        "200":
          description: 고객 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CustomerItem'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /get.php:
    get:
      tags: [고객]
      summary: 고객 상세 조회
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: 고객 ID
      responses:
        "200":
          description: 고객 상세 정보
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CustomerItem'
        "404":
          $ref: '#/components/responses/NotFound'

  /create.php:
    post:
      tags: [고객]
      summary: 고객 등록
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerWriteRequest'
      responses:
        "200":
          description: 고객 등록 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          id: { type: integer }
        "400":
          $ref: '#/components/responses/BadRequest'

  /update.php:
    put:
      tags: [고객]
      summary: 고객 정보 수정
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - properties:
                    id: { type: integer, description: "수정할 고객 ID" }
                - $ref: '#/components/schemas/CustomerWriteRequest'
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "404":
          $ref: '#/components/responses/NotFound'

  /hide.php:
    put:
      tags: [관리자-고객]
      summary: "[관리자] 고객 숨김/표시 설정"
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, is_hidden]
              properties:
                id:
                  type: integer
                  description: 고객 ID
                is_hidden:
                  type: boolean
                  description: true=숨김, false=표시
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID

  schemas:
    CustomerWriteRequest:
      type: object
      required: [company_name]
      properties:
        company_name:
          type: string
          maxLength: 200
          description: 회사명
        company_addr:
          type: string
          maxLength: 500
          description: 회사 주소
        contact_name:
          type: string
          maxLength: 100
          description: 담당자 이름
        contact_phone:
          type: string
          maxLength: 20
          description: 담당자 전화번호
        contact_email:
          type: string
          format: email
          description: 담당자 이메일

    CustomerItem:
      type: object
      properties:
        id:              { type: integer }
        company_name:    { type: string }
        company_addr:    { type: string }
        contact_name:    { type: string }
        contact_phone:   { type: string }
        contact_email:   { type: string }
        is_hidden:       { type: integer, enum: [0, 1] }
        created_by:      { type: integer }
        created_by_name: { type: string }
        created_at:      { type: string, format: date-time }
        updated_at:      { type: string, format: date-time }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data:    {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

  responses:
    Success:
      description: 처리 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
