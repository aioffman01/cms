openapi: 3.0.3
info:
  title: CMS 판매 제품 관리 API
  version: "1.0.0"
  description: |
    기업 고객관리 시스템의 고객별 판매 및 설치된 소프트웨어 제품 관련 API 명세서입니다.
    - 고객별 제품 목록 / 상세 조회
    - [관리자] 제품 등록 / 수정 / 삭제

servers:
  - url: /backend/product
    description: 판매 제품 Backend API 서버

tags:
  - name: 제품
    description: 제품 정보 조회
  - name: 관리자-제품
    description: 관리자 전용 제품 관리

paths:
  /list.php:
    get:
      tags: [제품]
      summary: 고객별 판매 제품 목록 조회
      description: 특정 고객에게 등록(설치)된 전체 제품 목록을 반환합니다.
      security:
        - sessionAuth: []
      parameters:
        - name: customer_id
          in: query
          required: true
          schema:
            type: integer
          description: 고객사 ID
      responses:
        "200":
          description: 제품 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductListItem'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /get.php:
    get:
      tags: [제품]
      summary: 판매 제품 상세 조회
      description: 제품 정보 및 연동된 하드웨어 사양 상세를 반환합니다.
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: 제품 ID
      responses:
        "200":
          description: 제품 상세 정보
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/ProductDetailItem'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /create.php:
    post:
      tags: [관리자-제품]
      summary: "[관리자] 판매 제품 등록"
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWriteRequest'
      responses:
        "200":
          description: 제품 등록 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          id: { type: integer }
        "400":
          $ref: '#/components/responses/BadRequest'
        "403":
          $ref: '#/components/responses/Forbidden'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /update.php:
    put:
      tags: [관리자-제품]
      summary: "[관리자] 판매 제품 정보 수정"
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - properties:
                    id: { type: integer, description: "수정할 제품 ID" }
                - $ref: '#/components/schemas/ProductWriteRequest'
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "400":
          $ref: '#/components/responses/BadRequest'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /delete.php:
    delete:
      tags: [관리자-제품]
      summary: "[관리자] 판매 제품 삭제"
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                  description: 삭제할 제품 ID
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID

  schemas:
    ProductWriteRequest:
      type: object
      required: [customer_id, model_name]
      properties:
        customer_id:
          type: integer
          description: 고객 ID
        hardware_id:
          type: integer
          nullable: true
          description: 연결할 하드웨어 ID
        model_name:
          type: string
          maxLength: 200
          description: 제품 모델명
        version:
          type: string
          maxLength: 500
          description: 제품 버전
        os_type:
          type: string
          maxLength: 100
          description: 설치된 운영체제(OS) 타입
        installed_at:
          type: string
          format: date
          nullable: true
          description: 설치 일자 (YYYY-MM-DD)

    ProductListItem:
      type: object
      properties:
        id:              { type: integer }
        customer_id:     { type: integer }
        hardware_id:     { type: integer, nullable: true }
        model_name:      { type: string }
        version:         { type: string }
        os_type:         { type: string }
        installed_at:    { type: string, format: date, nullable: true }
        created_by:      { type: integer }
        created_at:      { type: string, format: date-time }
        updated_at:      { type: string, format: date-time }
        hw_model:        { type: string, nullable: true }
        created_by_name: { type: string }

    ProductDetailItem:
      type: object
      properties:
        id:              { type: integer }
        customer_id:     { type: integer }
        hardware_id:     { type: integer, nullable: true }
        model_name:      { type: string }
        version:         { type: string }
        os_type:         { type: string }
        installed_at:    { type: string, format: date, nullable: true }
        created_by:      { type: integer }
        created_at:      { type: string, format: date-time }
        updated_at:      { type: string, format: date-time }
        hw_model:        { type: string, nullable: true }
        hw_cpu:          { type: integer, nullable: true }
        hw_disk:         { type: number, format: float, nullable: true }
        hw_nic:          { type: integer, nullable: true }
        created_by_name: { type: string }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data:    {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

  responses:
    Success:
      description: 처리 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
