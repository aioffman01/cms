openapi: 3.0.3
info:
  title: CMS 세부 항목 관리 API
  version: "1.0.0"
  description: |
    기업 고객관리 시스템의 세부 항목 관련 API 명세서입니다.
    - 세부 항목 등록 / 수정 / 삭제 / 조회
servers:
  - url: /backend/v1/mng_item
    description: 세부 항목 Backend API 서버 v1
tags:
  - name: 세부항목
    description: 세부 항목 정보 CRUD
paths:
  /list.php:
    get:
      tags: [세부항목]
      summary: 특정 대항목의 세부 항목 목록 조회
      security:
        - sessionAuth: []
      parameters:
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
          description: 대항목 고유 ID
        - name: category_code
          in: query
          required: false
          schema:
            type: string
          description: 대항목 고유 코드명 (category_id 대신 사용 가능)
        - name: is_use
          in: query
          required: false
          schema:
            type: string
            enum: [Y, N]
          description: 사용 여부로 필터링
      responses:
        "200":
          description: 세부 항목 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ItemListItem'

  /create.php:
    post:
      tags: [세부항목]
      summary: 세부 항목 등록
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, code, name]
              properties:
                category_id:
                  type: integer
                  description: 대항목 ID
                code:
                  type: string
                  description: 세부 항목 코드
                name:
                  type: string
                  description: 세부 항목 이름
                is_use:
                  type: string
                  enum: [Y, N]
                  description: 사용 여부 (디폴트 Y)
                description:
                  type: string
                  description: 세부 항목 상세 설명 및 기타 정보
      responses:
        "200":
          description: 세부 항목 등록 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          id: { type: integer }

  /update.php:
    put:
      tags: [세부항목]
      summary: 세부 항목 수정
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, code, name, is_use]
              properties:
                id:
                  type: integer
                  description: 수정할 세부 항목 ID
                code:
                  type: string
                  description: 세부 항목 코드
                name:
                  type: string
                  description: 세부 항목 이름
                is_use:
                  type: string
                  enum: [Y, N]
                  description: 사용 여부
                description:
                  type: string
                  description: 세부 항목 상세 설명 및 기타 정보
      responses:
        "200":
          $ref: '#/components/responses/Success'

  /delete.php:
    delete:
      tags: [세부항목]
      summary: 세부 항목 삭제
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                  description: 삭제할 세부 항목 ID
      responses:
        "200":
          $ref: '#/components/responses/Success'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID

  schemas:
    ItemListItem:
      type: object
      properties:
        id:            { type: integer }
        category_id:   { type: integer }
        code:          { type: string }
        name:          { type: string }
        full_code:     { type: string, description: "최종 결합 코드명 (대항목코드.세부항목코드)" }
        is_use:        { type: string, enum: [Y, N] }
        description:   { type: string, description: "세부 항목 상세 설명" }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data:    {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

  responses:
    Success:
      description: 처리 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
