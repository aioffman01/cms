openapi: 3.0.3
info:
  title: CMS 회원 API
  version: "1.0.0"
  description: |
    기업 고객관리 시스템의 회원 관련 API 명세서입니다.
    - 회원가입 / 로그인 / 로그아웃
    - 내 정보 수정
    - [관리자] 회원 목록 조회 및 역할 변경

servers:
  - url: /backend/member
    description: 회원 Backend API 서버

tags:
  - name: 인증
    description: 로그인/로그아웃 관련
  - name: 회원
    description: 회원 정보 관련
  - name: 관리자-회원
    description: 관리자 전용 회원 관리

paths:
  /register.php:
    post:
      tags: [인증]
      summary: 회원가입
      description: 아이디, 비밀번호, 이름으로 신규 회원을 등록합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login_id: "user01"
              password: "pass1234"
              name: "홍길동"
      responses:
        "200":
          description: 회원가입 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          id: { type: integer, example: 5 }
        "400":
          $ref: '#/components/responses/BadRequest'

  /login.php:
    post:
      tags: [인증]
      summary: 로그인
      description: 아이디와 비밀번호로 로그인합니다. 성공 시 세션이 생성됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserInfo'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /logout.php:
    post:
      tags: [인증]
      summary: 로그아웃
      description: 현재 세션을 종료합니다.
      responses:
        "200":
          description: 로그아웃 성공

  /me.php:
    get:
      tags: [회원]
      summary: 현재 로그인 사용자 정보 조회
      security:
        - sessionAuth: []
      responses:
        "200":
          description: 사용자 정보 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserInfo'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /update.php:
    put:
      tags: [회원]
      summary: 내 정보 수정
      description: 이름과 비밀번호를 수정합니다. 비밀번호는 변경 시에만 입력합니다.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /list.php:
    get:
      tags: [관리자-회원]
      summary: "[관리자] 전체 회원 목록 조회"
      security:
        - sessionAuth: []
      responses:
        "200":
          description: 회원 목록 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/MemberListItem'
        "403":
          $ref: '#/components/responses/Forbidden'

  /set_role.php:
    put:
      tags: [관리자-회원]
      summary: "[관리자] 회원 역할 변경"
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRoleRequest'
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "403":
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: PHP 세션 쿠키

  schemas:
    RegisterRequest:
      type: object
      required: [login_id, password, name]
      properties:
        login_id:
          type: string
          minLength: 4
          maxLength: 50
          description: 로그인 아이디
        password:
          type: string
          minLength: 6
          description: 비밀번호 (6자 이상)
        name:
          type: string
          maxLength: 100
          description: 이름

    LoginRequest:
      type: object
      required: [login_id, password]
      properties:
        login_id:
          type: string
        password:
          type: string

    UpdateMemberRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        password:
          type: string
          minLength: 6
          description: 변경할 비밀번호 (선택)

    SetRoleRequest:
      type: object
      required: [member_id, role]
      properties:
        member_id:
          type: integer
        role:
          type: string
          enum: [admin, user]

    UserInfo:
      type: object
      properties:
        id:   { type: integer }
        name: { type: string }
        role: { type: string, enum: [admin, user] }

    MemberListItem:
      type: object
      properties:
        id:         { type: integer }
        login_id:   { type: string }
        name:       { type: string }
        role:       { type: string, enum: [admin, user] }
        created_at: { type: string, format: date-time }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data:    {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

  responses:
    Success:
      description: 처리 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
