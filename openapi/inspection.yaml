openapi: 3.0.3
info:
  title: CMS 정기 점검 관리 API
  version: "1.0.0"
  description: |
    기업 고객관리 시스템의 정기 시스템 점검 관련 API 명세서입니다.
    - 점검 계획 등록 / 수정 / 삭제 / 상세조회 / 목록조회 (필터링)
servers:
  - url: /backend/v1/inspection
    description: 정기 점검 Backend API 서버 v1
tags:
  - name: 점검
    description: 점검 계획 및 결과 관리
paths:
  /list.php:
    get:
      tags: [점검]
      summary: 점검 목록 조회
      description: 점검 상태, 고객사 ID, 담당 엔지니어 ID 등의 조건으로 정기 점검 리스트를 필터링하여 조회합니다.
      security:
        - sessionAuth: []
      parameters:
        - name: customer_id
          in: query
          required: false
          schema:
            type: integer
          description: 고객사 ID 필터
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [scheduled, completed]
          description: 점검 상태 필터 (scheduled: 예정, completed: 완료)
        - name: member_id
          in: query
          required: false
          schema:
            type: integer
          description: 담당 엔지니어 회원 ID 필터
      responses:
        "200":
          description: 점검 목록 반환 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/InspectionListItem'

  /get.php:
    get:
      tags: [점검]
      summary: 점검 단건 상세 조회
      description: 지정한 점검 ID의 상세 계획 및 보고서 정보, 담당 배정 엔지니어 목록을 반환합니다.
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: 점검 고유 ID
      responses:
        "200":
          description: 점검 상세 정보 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/InspectionDetailItem'
        "404":
          $ref: '#/components/responses/NotFound'

  /create.php:
    post:
      tags: [점검]
      summary: 정기 점검 계획 신규 등록
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, title, planned_start_date, plan_content]
              properties:
                customer_id:
                  type: integer
                  description: 대상 고객사 고유 ID
                title:
                  type: string
                  description: 점검 계획 제목
                planned_start_date:
                  type: string
                  format: date
                  description: 점검 예정 시작일 (YYYY-MM-DD)
                planned_end_date:
                  type: string
                  format: date
                  description: 점검 예정 종료일 (YYYY-MM-DD, 미지정시 시작일과 동일)
                plan_content:
                  type: string
                  description: 점검 상세 계획 내용
                member_ids:
                  type: array
                  items:
                    type: integer
                  description: 배정 담당 엔지니어 회원 ID 배열
      responses:
        "200":
          description: 등록 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          id: { type: integer }

  /update.php:
    put:
      tags: [점검]
      summary: 점검 계획 수정 및 결과 보고서 갱신
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, title, planned_start_date, plan_content]
              properties:
                id:
                  type: integer
                  description: 점검 고유 ID
                title:
                  type: string
                  description: 점검 제목
                planned_start_date:
                  type: string
                  format: date
                  description: 점검 예정 시작일
                planned_end_date:
                  type: string
                  format: date
                  description: 점검 예정 종료일
                plan_content:
                  type: string
                  description: 점검 계획 상세
                actual_start_date:
                  type: string
                  format: date
                  description: 실제 점검 수행 시작일 (완료 시 필수)
                actual_end_date:
                  type: string
                  format: date
                  description: 실제 점검 수행 종료일 (완료 시 필수)
                report_content:
                  type: string
                  description: 점검 결과 보고 내용
                issues:
                  type: string
                  description: 주요 이슈 및 해결사항
                status:
                  type: string
                  enum: [scheduled, completed]
                  description: 점검 진행 상태 (scheduled: 예정, completed: 완료)
                member_ids:
                  type: array
                  items:
                    type: integer
                  description: 업데이트할 담당 엔지니어 회원 ID 배열
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "404":
          $ref: '#/components/responses/NotFound'

  /delete.php:
    delete:
      tags: [점검]
      summary: 점검 정보 삭제
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                  description: 삭제할 점검 ID
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "404":
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID

  schemas:
    InspectionListItem:
      type: object
      properties:
        id:                 { type: integer, description: "점검 ID" }
        customer_id:        { type: integer, description: "고객사 ID" }
        company_name:       { type: string, description: "고객사 이름" }
        title:              { type: string, description: "점검 제목" }
        status:             { type: string, enum: [scheduled, completed], description: "점검 상태" }
        planned_start_date: { type: string, format: date }
        planned_end_date:   { type: string, format: date }
        actual_start_date:  { type: string, format: date, nullable: true }
        actual_end_date:    { type: string, format: date, nullable: true }
        created_by_name:    { type: string, description: "등록자명" }
        engineer_names:     { type: string, description: "배정 담당자 쉼표 결합 목록 (예: 홍길동, 이순신)" }

    InspectionDetailItem:
      type: object
      properties:
        id:                 { type: integer }
        customer_id:        { type: integer }
        company_name:       { type: string }
        title:              { type: string }
        status:             { type: string, enum: [scheduled, completed] }
        planned_start_date: { type: string, format: date }
        planned_end_date:   { type: string, format: date }
        plan_content:       { type: string }
        actual_start_date:  { type: string, format: date, nullable: true }
        actual_end_date:    { type: string, format: date, nullable: true }
        report_content:     { type: string, nullable: true }
        issues:             { type: string, nullable: true }
        created_by:         { type: integer }
        created_by_name:    { type: string }
        created_at:         { type: string, format: date-time }
        engineers:
          type: array
          items:
            type: object
            properties:
              member_id:   { type: integer, description: "담당자 회원 ID" }
              member_name: { type: string, description: "담당자 이름" }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data:    {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

  responses:
    Success:
      description: 처리 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
