openapi: 3.0.3
info:
  title: CMS 하드웨어 관리 API
  version: "1.0.0"
  description: |
    기업 고객관리 시스템의 하드웨어 관련 API 명세서입니다.
    - 하드웨어 목록 / 상세 조회
    - [관리자] 하드웨어 등록 / 수정 / 활성화 토글

servers:
  - url: /backend/hardware
    description: 하드웨어 Backend API 서버

tags:
  - name: 하드웨어
    description: 하드웨어 정보 조회
  - name: 관리자-하드웨어
    description: 관리자 전용 하드웨어 관리

paths:
  /list.php:
    get:
      tags: [하드웨어]
      summary: 하드웨어 목록 조회
      description: |
        전체 하드웨어 목록을 반환합니다.
        - 일반 사용자: 활성 상태인 하드웨어만 조회 (`is_active`=1)
        - 관리자: 비활성 포함 전체 조회
      security:
        - sessionAuth: []
      responses:
        "200":
          description: 하드웨어 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HardwareItem'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /get.php:
    get:
      tags: [하드웨어]
      summary: 하드웨어 상세 조회
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: 하드웨어 ID
      responses:
        "200":
          description: 하드웨어 상세 정보
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/HardwareItem'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /create.php:
    post:
      tags: [관리자-하드웨어]
      summary: "[관리자] 하드웨어 등록"
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HardwareWriteRequest'
      responses:
        "200":
          description: 하드웨어 등록 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          id: { type: integer }
        "400":
          $ref: '#/components/responses/BadRequest'
        "403":
          $ref: '#/components/responses/Forbidden'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /update.php:
    put:
      tags: [관리자-하드웨어]
      summary: "[관리자] 하드웨어 정보 수정"
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - properties:
                    id: { type: integer, description: "수정할 하드웨어 ID" }
                - $ref: '#/components/schemas/HardwareWriteRequest'
      responses:
        "200":
          $ref: '#/components/responses/Success'
        "400":
          $ref: '#/components/responses/BadRequest'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /toggle.php:
    put:
      tags: [관리자-하드웨어]
      summary: "[관리자] 하드웨어 활성/비활성 토글"
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                  description: 하드웨어 ID
      responses:
        "200":
          description: 토글 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          is_active:
                            type: boolean
                            description: 변경 후 활성 상태
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID

  schemas:
    HardwareWriteRequest:
      type: object
      required: [model_name]
      properties:
        model_name:
          type: string
          maxLength: 200
          description: 모델명
        cpu_count:
          type: integer
          description: CPU 코어 수
        disk_tb:
          type: number
          format: float
          description: 디스크 용량 (TB)
        nic_count:
          type: integer
          description: NIC 개수
        note:
          type: string
          description: 비고

    HardwareItem:
      type: object
      properties:
        id:              { type: integer }
        model_name:      { type: string }
        cpu_count:       { type: integer }
        disk_tb:         { type: number, format: float }
        nic_count:       { type: integer }
        note:            { type: string }
        is_active:       { type: integer, enum: [0, 1] }
        created_by:      { type: integer }
        created_by_name: { type: string }
        created_at:      { type: string, format: date-time }
        updated_at:      { type: string, format: date-time }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data:    {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

  responses:
    Success:
      description: 처리 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
