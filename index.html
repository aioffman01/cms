<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Portal Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

    :root {
      --bg: #030712;
      --bg-card: #111827;
      --accent: #14b8a6;
      --accent-green: #10b981;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Malgun Gothic", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Cosmic grid background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(20, 184, 166, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 184, 166, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 800px;
      width: 100%;
      text-align: center;
      z-index: 10;
      padding: 20px;
    }

    header {
      margin-bottom: 48px;
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-muted);
      font-size: 16px;
      letter-spacing: 1px;
    }

    .portal-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .portal-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 24px;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 0 16px rgba(20, 184, 166, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .portal-card:hover {
      border-color: rgba(20, 184, 166, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 0 24px rgba(20, 184, 166, 0.15);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .portal-card p {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 600px) {
      .portal-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>CMS Portal</h1>
    <p>기업 고객 및 인프라 관리 플랫폼 통합 진입 포털</p>
  </header>

  <div class="portal-grid">
    <a href="frontend/auth/login.html" class="portal-card">
      <div class="icon">💼</div>
      <h2>CMS 서비스 로그인</h2>
      <p>고객 정보 관리 및 납품 인프라 확인을 위한 사원/관리자 전용 로그인 화면으로 진입합니다.</p>
    </a>

    <a href="doc/api_spec.html" class="portal-card">
      <div class="icon">📖</div>
      <h2>개발자 명세서 포털</h2>
      <p>보완된 API 명세서, 데이터베이스 스키마(DB Spec), 개발 아키텍처 프레젠테이션 문서를 확인합니다.</p>
    </a>
  </div>
</div>

</body>
</html>
