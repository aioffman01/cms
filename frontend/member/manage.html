<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — 회원 관리</title>
  <meta name="description" content="[관리자] 전체 회원 목록을 관리합니다.">
  <link rel="stylesheet" href="../common/style.css">
</head>
<body>

<div class="app-layout">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">회원 <span>관리</span></h1>
      <div class="flex gap-2 items-center">
        <span class="badge badge-admin">관리자 전용</span>
        <a href="../auth/register.html" class="btn btn-primary btn-sm">+ 신규 회원 등록</a>
      </div>
    </div>

    <div class="content-area">
      <div id="msg-area"></div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">전체 회원 목록</div>
          <div class="search-wrap">
            <input class="form-input" type="text" id="search-input"
                   placeholder="이름 또는 아이디 검색..." style="min-width:200px">
          </div>
        </div>
        <div id="table-area">
          <div class="loading"><div class="spinner"></div>불러오는 중...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 역할 변경 모달 -->
<div class="modal-overlay" id="role-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="role-modal-title">
    <div class="modal-title" id="role-modal-title">역할 변경</div>
    <div class="modal-body">
      <p id="role-modal-msg" class="mb-4"></p>
      <div class="form-group">
        <label class="form-label" for="role-select">역할 선택</label>
        <select class="form-select" id="role-select">
          <option value="user">일반사용자</option>
          <option value="worker">작업자</option>
          <option value="admin">관리자</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="role-modal-cancel">취소</button>
      <button class="btn btn-primary" id="role-modal-confirm">변경</button>
    </div>
  </div>
</div>

<script src="../common/api.js?v=4"></script>
<script src="../common/layout.js"></script>
<script src="manage.js"></script>
</body>
</html>
