<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — 내 정보 수정</title>
  <meta name="description" content="내 프로필 정보를 수정합니다.">
  <link rel="stylesheet" href="../common/style.css">
</head>
<body>

<div class="app-layout">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">내 <span>정보 수정</span></h1>
    </div>

    <div class="content-area">
      <div id="msg-area"></div>

      <div class="card" style="max-width:520px">
        <div class="card-header">
          <div class="card-title">프로필 설정</div>
        </div>
        <div class="card-body">
          <form id="profile-form" novalidate>
            <div class="form-group">
              <label class="form-label">아이디</label>
              <input class="form-input" type="text" id="disp-login-id"
                     disabled style="color: var(--text-muted); cursor: not-allowed;">
              <div class="form-hint">아이디는 변경할 수 없습니다.</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="profile-name">이름 <span class="text-accent">*</span></label>
              <input class="form-input" type="text" id="profile-name"
                     placeholder="이름을 입력하세요" required>
            </div>

            <hr class="separator">

            <div class="form-group">
              <label class="form-label" for="profile-pw">새 비밀번호</label>
              <input class="form-input" type="password" id="profile-pw"
                     placeholder="변경할 경우에만 입력"
                     autocomplete="new-password">
              <div class="form-hint">변경하지 않으려면 비워두세요. (6자 이상)</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="profile-pw2">새 비밀번호 확인</label>
              <input class="form-input" type="password" id="profile-pw2"
                     placeholder="비밀번호를 다시 입력"
                     autocomplete="new-password">
            </div>

            <div class="form-actions">
              <button class="btn btn-primary" type="submit" id="btn-save">
                저장
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../common/api.js"></script>
<script src="../common/layout.js"></script>
<script src="profile.js"></script>
</body>
</html>
