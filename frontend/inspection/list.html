<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — 점검 목록</title>
  <meta name="description" content="고객사 점검 계획 및 결과 보고서 목록입니다.">
  <link rel="stylesheet" href="../common/style.css?v=6">
  <style>
    .member-checkbox-list {
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
    }
    .member-checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .member-checkbox-item input {
      cursor: pointer;
    }
    .member-badge {
      display: inline-block;
      background: rgba(20, 184, 166, 0.15);
      color: var(--accent);
      border: 1px solid rgba(20, 184, 166, 0.3);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      margin-right: 4px;
    }
  </style>
</head>
<body>

<div class="app-layout">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">점검 <span>목록</span></h1>
      <button class="btn btn-primary" id="btn-add-inspection">+ 점검 계획 등록</button>
    </div>

    <div class="content-area">
      <div id="msg-area"></div>

      <!-- 필터 바 -->
      <div class="card mb-4">
        <div class="card-body flex justify-between items-center flex-wrap gap-4" style="padding: 16px 20px;">
          <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
              <span class="text-sm text-muted">상태:</span>
              <select class="form-select" id="filter-status" style="padding: 6px 12px; font-size: 13px;">
                <option value="">전체</option>
                <option value="scheduled">예정</option>
                <option value="completed">완료</option>
              </select>
            </div>
            <button class="btn btn-primary" id="btn-filter-apply" style="padding: 6px 16px; font-size: 13px; margin-left: 4px;">확인</button>
          </div>
        </div>
      </div>

      <!-- 테이블 카드 -->
      <div class="card">
        <div id="table-area">
          <div class="loading"><div class="spinner"></div>불러오는 중...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 점검 결과 보고서 작성 모달 -->
<div class="modal-overlay" id="report-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="report-modal-title" style="max-width: 550px;">
    <div class="modal-title" id="report-modal-title">점검 결과 보고서 작성</div>
    <div class="modal-body">
      <form id="report-form" novalidate>
        <div class="form-group">
          <label class="form-label">고객사</label>
          <input class="form-input" type="text" id="report-customer" readonly style="background: rgba(255,255,255,0.05); color: var(--text-muted);">
        </div>
        <div class="form-group">
          <label class="form-label" for="report-content">점검결과 <span class="text-accent">*</span></label>
          <textarea class="form-input" id="report-content" rows="4" placeholder="점검 조치 사항 및 결과를 입력하세요" required style="resize: vertical; min-height: 80px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="report-issues">이슈사항</label>
          <textarea class="form-input" id="report-issues" rows="3" placeholder="점검 중 발생한 이슈나 특이사항이 있다면 입력하세요" style="resize: vertical; min-height: 60px;"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="report-modal-cancel">취소</button>
      <button class="btn btn-primary" id="report-modal-submit" form="report-form">보고서 완료</button>
    </div>
  </div>
</div>

<script src="../common/api.js?v=10"></script>
<script src="../common/layout.js?v=10"></script>
<script src="list.js?v=10"></script>
</body>
</html>
