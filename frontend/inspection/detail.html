<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — 점검 상세</title>
  <meta name="description" content="점검 상세 정보 및 결과 보고서를 확인합니다.">
  <link rel="stylesheet" href="../common/style.css?v=6">
  <style>
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
    .info-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-main);
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 42px;
      display: flex;
      align-items: center;
    }
    .info-value.textarea {
      align-items: flex-start;
      min-height: 100px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="app-layout">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">점검 <span>상세 정보</span></h1>
      <div class="flex gap-2">
        <a href="list.html" class="btn btn-ghost" id="btn-back">← 목록으로</a>
        <button class="btn btn-primary" id="btn-edit-inspection" style="display:none;">점검 계획 수정</button>
        <button class="btn btn-success" id="btn-report-inspection" style="display:none;">점검 보고 작성</button>
        <button class="btn btn-danger" id="btn-delete-inspection" style="display:none;">점검 삭제</button>
      </div>
    </div>

    <div class="content-area">
      <div id="msg-area"></div>
      
      <div id="detail-loading" class="loading"><div class="spinner"></div>불러오는 중...</div>
      
      <!-- 상세 카드 -->
      <div class="card" id="detail-card" style="display:none; padding: 24px; margin-bottom: 24px;">
        <div class="detail-grid">
          <div class="detail-item full-width" style="border-color: var(--accent);">
            <div class="detail-label">점검 제목</div>
            <div class="detail-value" id="val-title" style="font-size: 16px; font-weight: bold; color: var(--accent);"></div>
          </div>
          
          <div class="detail-item">
            <div class="detail-label">대상 고객사</div>
            <div class="detail-value" id="val-customer"></div>
          </div>
          
          <div class="detail-item">
            <div class="detail-label">진행 상태</div>
            <div class="detail-value" id="val-status"></div>
          </div>
          
          <div class="detail-item">
            <div class="detail-label">점검 계획 일정</div>
            <div class="detail-value" id="val-planned-date"></div>
          </div>
          
          <div class="detail-item">
            <div class="detail-label">실제 점검 완료일</div>
            <div class="detail-value" id="val-actual-date"></div>
          </div>
          
          <div class="detail-item full-width">
            <div class="detail-label">점검 담당자</div>
            <div class="detail-value" id="val-assignees" style="display: flex; flex-wrap: wrap; gap: 6px;"></div>
          </div>
          
          <div class="detail-item full-width" style="align-items: flex-start;">
            <div class="detail-label" style="margin-top: 2px;">점검 계획 내용</div>
            <div class="detail-value" id="val-plan-content" style="white-space: pre-wrap; line-height: 1.5; flex: 1;"></div>
          </div>

          <div class="detail-item full-width" style="display:none; align-items: flex-start; border-color: rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.02);" id="group-report">
            <div class="detail-label" style="color: #34d399; margin-top: 2px;">점검결과</div>
            <div class="detail-value" id="val-report-content" style="white-space: pre-wrap; line-height: 1.5; flex: 1; color: #34d399;"></div>
          </div>

          <div class="detail-item full-width" style="display:none; align-items: flex-start; border-color: rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.02);" id="group-issues">
            <div class="detail-label" style="color: #f87171; margin-top: 2px;">이슈사항</div>
            <div class="detail-value" id="val-issues" style="white-space: pre-wrap; line-height: 1.5; flex: 1; color: #f87171;"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 점검 계획 등록/수정 모달 -->
<div class="modal-overlay" id="inspection-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" style="max-width: 550px;">
    <div class="modal-title" id="modal-title">점검 계획 수정</div>
    <div class="modal-body">
      <form id="inspection-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="customer-id">대상 고객사 <span class="text-accent">*</span></label>
          <select class="form-select" id="customer-id" disabled style="background: rgba(255,255,255,0.05); color: var(--text-muted);">
            <option value="">-- 고객사 선택 --</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="inspection-title">점검 제목 <span class="text-accent">*</span></label>
          <input class="form-input" type="text" id="inspection-title" placeholder="예: 7월 정기 서버 점검" required>
        </div>
        <div class="form-group">
          <label class="form-label">점검 기간 구분</label>
          <div class="flex gap-4 mb-2">
            <label class="member-checkbox-item" style="margin-bottom:0; cursor:pointer;">
              <input type="radio" name="plan-date-type" value="single" checked>
              <span>하루</span>
            </label>
            <label class="member-checkbox-item" style="margin-bottom:0; cursor:pointer;">
              <input type="radio" name="plan-date-type" value="range">
              <span>기간 선택</span>
            </label>
          </div>
        </div>
        <div class="form-group flex gap-2" id="plan-date-container">
          <div style="flex:1;">
            <label class="form-label" for="planned-start-date">시작일 <span class="text-accent">*</span></label>
            <input class="form-input" type="date" id="planned-start-date" required>
          </div>
          <div style="flex:1; display:none;" id="plan-end-date-wrapper">
            <label class="form-label" for="planned-end-date">종료일 <span class="text-accent">*</span></label>
            <input class="form-input" type="date" id="planned-end-date">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="member-dropdown">점검 담당자 추가 <span class="text-accent">*</span></label>
          <select class="form-select" id="member-dropdown">
            <option value="">-- 담당자 선택 (관리자/작업자) --</option>
          </select>
          <div id="selected-members-list" class="flex flex-wrap gap-2 mt-2" style="min-height: 38px; padding: 6px 12px; border: 1px dashed var(--border); border-radius: var(--radius); background: rgba(0,0,0,0.15); align-items: center;">
            <!-- 선택된 담당자 뱃지들이 동적으로 들어감 -->
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="plan-content">점검 계획 내용 <span class="text-accent">*</span></label>
          <textarea class="form-input" id="plan-content" rows="4" placeholder="점검 예정 내용 및 계획을 상세히 기술하세요" required style="resize: vertical; min-height: 80px;"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">취소</button>
      <button class="btn btn-primary" id="modal-submit" form="inspection-form">계획 수정</button>
    </div>
  </div>
</div>

<!-- 점검 결과 보고서 작성 모달 -->
<div class="modal-overlay" id="report-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="report-modal-title" style="max-width: 550px;">
    <div class="modal-title" id="report-modal-title">점검 결과 보고서 작성</div>
    <div class="modal-body">
      <form id="report-form" novalidate>
        <div class="form-group">
          <label class="form-label">고객사</label>
          <input class="form-input" type="text" id="report-customer" readonly style="background: rgba(255,255,255,0.05); color: var(--text-muted);">
        </div>
        <div class="form-group">
          <label class="form-label" for="report-content">점검결과 <span class="text-accent">*</span></label>
          <textarea class="form-input" id="report-content" rows="4" placeholder="점검 조치 사항 및 결과를 입력하세요" required style="resize: vertical; min-height: 80px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="report-issues">이슈사항</label>
          <textarea class="form-input" id="report-issues" rows="3" placeholder="점검 중 발생한 이슈나 특이사항이 있다면 입력하세요" style="resize: vertical; min-height: 60px;"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="report-modal-cancel">취소</button>
      <button class="btn btn-primary" id="report-modal-submit" form="report-form">보고서 완료</button>
    </div>
  </div>
</div>

<script src="../common/api.js?v=6"></script>
<script src="../common/layout.js?v=6"></script>
<script src="detail.js?v=6"></script>
</body>
</html>
