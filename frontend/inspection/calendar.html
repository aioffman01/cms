<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — 점검 캘린더</title>
  <meta name="description" content="고객사 제품 점검 일정을 월별 달력으로 시각화합니다.">
  <link rel="stylesheet" href="../common/style.css">
  <style>
    .calendar-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .calendar-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .calendar-title-display {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      min-width: 140px;
      text-align: center;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(3, 7, 18, 0.4);
    }
    .calendar-day-header {
      background: rgba(20, 184, 166, 0.08);
      color: var(--accent);
      text-align: center;
      padding: 10px 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }
    .calendar-day-cell {
      min-height: 120px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: rgba(255, 255, 255, 0.01);
      transition: background 0.2s;
    }
    .calendar-day-cell:nth-child(7n) {
      border-right: none;
    }
    .calendar-day-cell:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .calendar-day-cell.other-month {
      opacity: 0.25;
      background: none;
    }
    .calendar-day-cell.today {
      background: rgba(20, 184, 166, 0.04);
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .day-number-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .calendar-day-cell.today .day-number-label {
      color: var(--accent);
    }
    .calendar-item {
      font-size: 11px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid transparent;
      transition: transform 0.1s, filter 0.1s;
    }
    .calendar-item:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }
    .calendar-item.completed {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      text-decoration: line-through;
    }
    .calendar-item.scheduled {
      background: rgba(20, 184, 166, 0.15);
      border-color: rgba(20, 184, 166, 0.4);
      color: var(--accent);
    }
    .member-checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="app-layout">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">점검 <span>캘린더</span></h1>
    </div>

    <div class="content-area">
      <div id="msg-area"></div>

      <!-- 달력 컨트롤러 바 -->
      <div class="card mb-4">
        <div class="card-body calendar-header-bar">
          <div class="calendar-controls">
            <button class="btn btn-secondary btn-sm" id="btn-prev-month" style="padding: 6px 12px;">&lt; 이전달</button>
            <div class="calendar-title-display" id="calendar-month-year">2026년 7월</div>
            <button class="btn btn-secondary btn-sm" id="btn-next-month" style="padding: 6px 12px;">다음달 &gt;</button>
            <button class="btn btn-ghost btn-sm" id="btn-today" style="padding: 6px 12px;">오늘</button>
          </div>
          <div class="flex items-center gap-4">
            <label class="member-checkbox-item" style="margin-bottom:0;">
              <input type="checkbox" id="filter-my-work">
              <span>내 점검만 보기</span>
            </label>
          </div>
        </div>
      </div>

      <!-- 캘린더 그리드 영역 -->
      <div class="calendar-grid" id="calendar-grid-board">
        <!-- JS로 동적 생성됨 -->
      </div>
    </div>
  </main>
</div>

<!-- 점검 상세 및 결과 보고서 모달 (캘린더용) -->
<div class="modal-overlay" id="report-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="report-modal-title" style="max-width: 550px;">
    <div class="modal-title" id="report-modal-title">점검 보고서</div>
    <div class="modal-body">
      <form id="report-form" novalidate>
        <div class="form-group">
          <label class="form-label">대상 고객사</label>
          <input class="form-input" type="text" id="report-customer" readonly style="background: rgba(255,255,255,0.05); color: var(--text-muted);">
        </div>
        <div class="form-group">
          <label class="form-label">점검 담당자</label>
          <input class="form-input" type="text" id="report-members" readonly style="background: rgba(255,255,255,0.05); color: var(--text-muted);">
        </div>
        <div class="form-group">
          <label class="form-label">점검 계획 내용</label>
          <textarea class="form-input" id="report-plan-content" readonly style="background: rgba(255,255,255,0.05); color: var(--text-muted); resize: none;" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">실제 점검기간 구분</label>
          <div class="flex gap-4 mb-2" id="actual-date-type-container">
            <label class="member-checkbox-item" style="margin-bottom:0;">
              <input type="radio" name="actual-date-type" value="single" checked>
              <span>하루</span>
            </label>
            <label class="member-checkbox-item" style="margin-bottom:0;">
              <input type="radio" name="actual-date-type" value="range">
              <span>기간 선택</span>
            </label>
          </div>
        </div>
        <div class="form-group flex gap-2" id="actual-date-container">
          <div style="flex:1;">
            <label class="form-label" for="actual-start-date">시작일 <span class="text-accent">*</span></label>
            <input class="form-input" type="date" id="actual-start-date" required>
          </div>
          <div style="flex:1; display:none;" id="actual-end-date-wrapper">
            <label class="form-label" for="actual-end-date">종료일 <span class="text-accent">*</span></label>
            <input class="form-input" type="date" id="actual-end-date">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="report-content">점검 결과 내용 <span class="text-accent">*</span></label>
          <textarea class="form-input" id="report-content" rows="5" placeholder="점검 조치 사항 및 결과를 입력하세요" required style="resize: vertical; min-height: 100px;"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="report-modal-cancel">닫기</button>
      <button class="btn btn-danger" id="report-modal-delete">일정 삭제</button>
      <button class="btn btn-primary" id="report-modal-submit" form="report-form">보고서 완료</button>
    </div>
  </div>
</div>

<script src="../common/api.js?v=4"></script>
<script src="../common/layout.js"></script>
<script src="calendar.js"></script>
</body>
</html>
