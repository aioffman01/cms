<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — 제품 업그레이드</title>
  <meta name="description" content="[관리자] 판매된 제품의 버전 및 OS 정보를 업그레이드하고 이력을 관리합니다.">
  <link rel="stylesheet" href="../common/style.css?v=10">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title" id="page-title">제품 <span>업그레이드</span></h1>
      <a id="btn-back" href="detail.html" class="btn btn-ghost">← 제품 상세로</a>
    </div>
    <div class="content-area">
      <div id="msg-area"></div>

      <div class="card" style="max-width:600px">
        <div class="card-header">
          <div class="card-title">버전 및 OS 업그레이드</div>
        </div>
        <div class="card-body">
          <form id="upgrade-form" novalidate>
            <!-- 제품 정보 (읽기전용) -->
            <div class="form-group">
              <label class="form-label">제품 이름</label>
              <input class="form-input" type="text" id="product-name" readonly style="background: rgba(255,255,255,0.05); color: var(--text-muted);">
            </div>
            <div class="form-group">
              <label class="form-label">제품 모델명</label>
              <input class="form-input" type="text" id="model-name" readonly style="background: rgba(255,255,255,0.05); color: var(--text-muted);">
            </div>

            <!-- 업그레이드 입력 요소 -->
            <div class="form-group">
              <label class="form-label" for="license">새 제품 버전 <span class="text-accent">*</span></label>
              <select class="form-select" id="license" required>
                <option value="">-- 제품 버전 선택 --</option>
              </select>
              <div class="form-hint" id="current-version-hint" style="color: var(--text-muted); font-size:12px; margin-top:4px;">현재 버전: -</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="os-type">새 설치 OS <span class="text-accent">*</span></label>
              <select class="form-select" id="os-type" required>
                <option value="">-- 설치 OS 선택 --</option>
              </select>
              <div class="form-hint" id="current-os-hint" style="color: var(--text-muted); font-size:12px; margin-top:4px;">현재 OS: -</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="notes">참고사항</label>
              <textarea class="form-input" id="notes" rows="4" placeholder="업그레이드 관련 특이사항이나 진행 메모 입력" style="resize: vertical; min-height: 80px;"></textarea>
            </div>

            <div class="form-actions" style="margin-top: 24px;">
              <a id="cancel-btn" href="detail.html" class="btn btn-ghost">취소</a>
              <button class="btn btn-primary" type="submit" id="btn-submit" style="background: var(--accent); color: #000; border-color: var(--accent);">업그레이드 실행</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../common/api.js?v=10"></script>
<script src="../common/layout.js?v=10"></script>
<script src="upgrade.js?v=10"></script>
</body>
</html>
