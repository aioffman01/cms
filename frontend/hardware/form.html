<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — 하드웨어 등록/수정</title>
  <meta name="description" content="[관리자] 하드웨어 제품을 등록하거나 수정합니다.">
  <link rel="stylesheet" href="../common/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title" id="page-title">하드웨어 <span>등록</span></h1>
      <a href="list.html" class="btn btn-ghost">← 목록으로</a>
    </div>
    <div class="content-area">
      <div id="msg-area"></div>
      <div class="card" style="max-width:640px">
        <div class="card-header">
          <div class="card-title" id="card-title">새 하드웨어 등록</div>
        </div>
        <div class="card-body">
          <form id="hw-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="model-name">모델명 <span class="text-accent">*</span></label>
              <input class="form-input" type="text" id="model-name" placeholder="예) SuperServer 1U-A100" required>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="cpu-count">CPU 갯수</label>
                <input class="form-input" type="number" id="cpu-count" value="0" min="0">
              </div>
              <div class="form-group">
                <label class="form-label" for="disk-tb">DISK 용량 (TB)</label>
                <input class="form-input" type="number" id="disk-tb" value="0" min="0" step="0.1">
              </div>
              <div class="form-group">
                <label class="form-label" for="nic-count">NIC Card 갯수</label>
                <input class="form-input" type="number" id="nic-count" value="0" min="0">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="note">비고</label>
              <textarea class="form-textarea" id="note" placeholder="비고 사항을 입력하세요"></textarea>
            </div>
            <div class="form-actions">
              <a href="list.html" class="btn btn-ghost">취소</a>
              <button class="btn btn-primary" type="submit" id="btn-submit">저장</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../common/api.js"></script>
<script src="../common/layout.js"></script>
<script src="form.js"></script>
</body>
</html>
