<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — 로그인</title>
  <meta name="description" content="기업 고객관리 시스템 로그인 페이지입니다.">
  <link rel="stylesheet" href="../common/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-logo">CMS</div>
  <div class="login-logo-sub">고객 관리 시스템</div>

  <div class="login-box">
    <div class="login-title">로그인</div>

    <div id="msg-area"></div>

    <form id="login-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-id">아이디</label>
        <input class="form-input" type="text" id="login-id"
               placeholder="아이디를 입력하세요"
               autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-pw">비밀번호</label>
        <input class="form-input" type="password" id="login-pw"
               placeholder="비밀번호를 입력하세요"
               autocomplete="current-password">
      </div>
      <button class="btn btn-primary login-btn" type="submit" id="btn-login">
        로그인
      </button>
    </form>
    <!-- 회원가입 안내 제거 -->
  </div>

  <div class="login-copyright">&copy; 2025 CMS — 기업 고객관리 시스템</div>
</div>

<script src="../common/api.js?v=3"></script>
<script src="login.js"></script>
</body>
</html>
